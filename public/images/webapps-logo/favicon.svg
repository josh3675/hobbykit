<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <rect width="64" height="64" rx="14" fill="#1A1A2E"/>

  <!-- Left phone -->
  <rect x="4" y="14" width="16" height="26" rx="3" fill="#0F0F1A" stroke="#F97316" stroke-width="1.2"/>
  <rect x="6.5" y="17.5" width="11" height="16" rx="1" fill="url(#fav-left)"/>
  <circle cx="12" cy="44" r="1.5" fill="#F97316" opacity="0.7"/>

  <!-- Middle phone (raised) -->
  <rect x="24" y="6" width="16" height="26" rx="3" fill="#0F0F1A" stroke="#6366F1" stroke-width="1.2"/>
  <rect x="26.5" y="9.5" width="11" height="16" rx="1" fill="url(#fav-mid)"/>
  <circle cx="32" cy="36" r="1.5" fill="#6366F1" opacity="0.9"/>

  <!-- Right phone -->
  <rect x="44" y="14" width="16" height="26" rx="3" fill="#0F0F1A" stroke="#10B981" stroke-width="1.2"/>
  <rect x="46.5" y="17.5" width="11" height="16" rx="1" fill="url(#fav-right)"/>
  <circle cx="52" cy="44" r="1.5" fill="#10B981" opacity="0.7"/>

  <defs>
    <linearGradient id="fav-left" x1="6.5" y1="17.5" x2="17.5" y2="33.5" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="fav-mid" x1="26.5" y1="9.5" x2="37.5" y2="25.5" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.12"/>
    </linearGradient>
    <linearGradient id="fav-right" x1="46.5" y1="17.5" x2="57.5" y2="33.5" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.08"/>
    </linearGradient>
  </defs>
</svg>

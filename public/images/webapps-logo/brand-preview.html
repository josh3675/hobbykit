<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>webapps.life — Brand Assets</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --obsidian: #1A1A2E;
    --indigo: #6366F1;
    --tangerine: #F97316;
    --emerald: #10B981;
    --off-white: #F8F8FF;
    --mid: #6B7280;
  }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--off-white);
    color: var(--obsidian);
    min-height: 100vh;
    padding: 48px 32px;
  }

  h1 {
    font-size: 13px;
    font-family: 'DM Mono', monospace;
    letter-spacing: 3px;
    color: var(--mid);
    text-transform: uppercase;
    margin-bottom: 40px;
  }

  .section { margin-bottom: 56px; }

  .section-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--mid);
    text-transform: uppercase;
    margin-bottom: 20px;
    padding-bottom: 10px;
    border-bottom: 1px solid #E5E7EB;
  }

  .asset-row {
    display: flex;
    gap: 24px;
    align-items: flex-start;
    flex-wrap: wrap;
  }

  .asset-box {
    background: white;
    border-radius: 12px;
    padding: 32px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }

  .asset-box.dark {
    background: var(--obsidian);
  }

  .asset-box label {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    letter-spacing: 1.5px;
    color: var(--mid);
    text-transform: uppercase;
  }

  .asset-box.dark label { color: #6B7280; }

  /* Colour swatches */
  .swatches { display: flex; gap: 16px; flex-wrap: wrap; }
  .swatch {
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
  }
  .swatch-block {
    width: 80px;
    height: 80px;
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .swatch-name {
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 12px;
    color: var(--obsidian);
  }
  .swatch-hex {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--mid);
  }

  /* Inline SVGs */
  svg { display: block; }

  .usage-note {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--mid);
    margin-top: 10px;
    line-height: 1.6;
  }
</style>
</head>

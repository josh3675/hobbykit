<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 96" fill="none">
  <!-- Left phone screen (Tangerine accent) -->
  <rect x="4" y="20" width="34" height="56" rx="6" fill="#1A1A2E" stroke="#F97316" stroke-width="2"/>
  <rect x="9" y="28" width="24" height="36" rx="2" fill="#F97316" opacity="0.15"/>
  <rect x="9" y="28" width="24" height="36" rx="2" fill="url(#grad-left)"/>
  <circle cx="21" cy="70" r="2.5" fill="#F97316" opacity="0.6"/>

  <!-- Middle phone screen (Indigo accent, raised) -->
  <rect x="43" y="8" width="34" height="56" rx="6" fill="#1A1A2E" stroke="#6366F1" stroke-width="2"/>
  <rect x="48" y="16" width="24" height="36" rx="2" fill="url(#grad-mid)"/>
  <circle cx="60" cy="58" r="2.5" fill="#6366F1" opacity="0.8"/>

  <!-- Right phone screen (Emerald accent) -->
  <rect x="82" y="20" width="34" height="56" rx="6" fill="#1A1A2E" stroke="#10B981" stroke-width="2"/>
  <rect x="87" y="28" width="24" height="36" rx="2" fill="url(#grad-right)"/>
  <circle cx="99" cy="70" r="2.5" fill="#10B981" opacity="0.6"/>

  <!-- Screen content lines - left -->
  <rect x="12" y="32" width="18" height="2" rx="1" fill="#F97316" opacity="0.5"/>
  <rect x="12" y="37" width="14" height="2" rx="1" fill="#F97316" opacity="0.3"/>
  <rect x="12" y="42" width="16" height="2" rx="1" fill="#F97316" opacity="0.3"/>
  <rect x="12" y="52" width="18" height="6" rx="2" fill="#F97316" opacity="0.4"/>

  <!-- Screen content lines - middle -->
  <rect x="51" y="20" width="18" height="2" rx="1" fill="#6366F1" opacity="0.6"/>
  <rect x="51" y="25" width="14" height="2" rx="1" fill="#6366F1" opacity="0.4"/>
  <rect x="51" y="30" width="16" height="2" rx="1" fill="#6366F1" opacity="0.4"/>
  <rect x="51" y="40" width="18" height="6" rx="2" fill="#6366F1" opacity="0.5"/>

  <!-- Screen content lines - right -->
  <rect x="90" y="32" width="18" height="2" rx="1" fill="#10B981" opacity="0.5"/>
  <rect x="90" y="37" width="14" height="2" rx="1" fill="#10B981" opacity="0.3"/>
  <rect x="90" y="42" width="16" height="2" rx="1" fill="#10B981" opacity="0.3"/>
  <rect x="90" y="52" width="18" height="6" rx="2" fill="#10B981" opacity="0.4"/>

  <defs>
    <linearGradient id="grad-left" x1="9" y1="28" x2="33" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#F97316" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#F97316" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="grad-mid" x1="48" y1="16" x2="72" y2="52" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#6366F1" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#6366F1" stop-opacity="0.08"/>
    </linearGradient>
    <linearGradient id="grad-right" x1="87" y1="28" x2="111" y2="64" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10B981" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#10B981" stop-opacity="0.05"/>
    </linearGradient>
  </defs>
</svg>
